<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Plant Disease Detection</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/auth.css') }}"
    />
  </head>

  <body>
    <div class="auth-bg">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
    </div>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-title">Plant Disease Detection</div>
        <div class="auth-sub">Login to continue</div>

        {% if error %}
        <div class="alert alert-danger auth-alert mt-3" role="alert">
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" class="mt-3">
          <div class="mb-3 auth-field">
            <label class="form-label fw-bold">Email</label>
            <input
              name="email"
              type="email"
              class="form-control"
              required
              placeholder="you@example.com"
            />
          </div>

          <div class="mb-3 auth-field">
            <label class="form-label fw-bold">Password</label>
            <input
              name="password"
              type="password"
              class="form-control"
              required
              placeholder="Enter password"
            />
          </div>

          <button type="submit" class="btn btn-auth">
            Login
          </button>

          <div class="mt-3 text-center auth-links fw-bold">
            Don't have an account?
            <a href="{{ url_for('signup') }}">Sign up</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
